<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="./style.css">
<head>
    <title>Cadastro</title>
</head>
<body>
    <div class="container-login">
        <form action="./sucesso.html" class="form">
            <h1 id="tituloform">Cadastro</h1>
            <label class="textlabel">Nome:</label>
            <input 
                class="campotexto"
                type="text"
                name="nome"
                required
            >
            <label class="textlabel">Email:</label>
            <input 
                class="campotexto"
                type="email"
                name="email"
                required
            >
            <label class="textlabel">Senha:</label>
            <input 
                class="campotexto"
                type="password"
                name="senha"
                required
            >
            <button id="bnenviar" type="submit">
                Enviar
            </button>
        </form>
</body>
</html>
